# TEMPORARY test workflow for validating the new parallel multi-arch
# release pipeline. Lives on the `release-workflow-test` branch so we
# can iterate without touching main, opening a PR, or risking a real
# release.
#
# What this validates (the bits new+risky in the upcoming release.yaml
# refactor — the prepare job's gem/tag steps are essentially unchanged
# from the old workflow and already proven in production):
#   - `ubuntu-24.04-arm` native arm64 runner availability
#   - Per-arch matrix (linux/amd64 on x86, linux/arm64 on arm) in parallel
#   - `push-by-digest=true` output mode in docker/build-push-action
#   - actions/upload-artifact + download-artifact passing digests between jobs
#   - `docker buildx imagetools create` stitching the multi-arch manifest
#   - cache-from/cache-to scoped per arch
#
# Safety:
#   - No git tag is created. No gem is published.
#   - The manifest is tagged `trmnl/trmnlp:test-<short-sha>` so it does
#     not collide with real release tags.
#   - Each push to this branch reruns the whole pipeline.
#
# Cleanup: delete this file and the `release-workflow-test` branch
# once the real release.yaml is merged and validated. Also delete the
# `trmnl/trmnlp:test-*` tags from Docker Hub.

name: Release Test

on:
  push:
    branches:
      - release-workflow-test

env:
  IMAGE: trmnl/trmnlp

jobs:
  docker-build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            arch: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            arch: arm64
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v6

      - name: Read Ruby version
        run: echo "RUBY_VERSION=$(cat .ruby-version)" >> "$GITHUB_ENV"

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: ${{ matrix.platform }}
          build-args: |
            RUBY_VERSION=${{ env.RUBY_VERSION }}
          outputs: type=image,name=${{ env.IMAGE }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=test-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=test-${{ matrix.arch }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Create multi-arch test manifest
        working-directory: /tmp/digests
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          docker buildx imagetools create \
            -t ${{ env.IMAGE }}:test-${SHORT_SHA} \
            $(printf '${{ env.IMAGE }}@sha256:%s ' *)

      - name: Inspect image
        run: |
          SHORT_SHA="${GITHUB_SHA:0:7}"
          docker buildx imagetools inspect ${{ env.IMAGE }}:test-${SHORT_SHA}
